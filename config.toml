# ============================================================
#  TCC — Terminal Command Center | JARVIS v2.0
#  User Configuration
#  Edit this file to register your devices.
# ============================================================

[tcc]
version     = "2.0"
log_level   = "INFO"          # DEBUG | INFO | WARNING | ERROR
log_dir     = "logs"
screenshot_dir = "screenshots"

# ============================================================
# DEVICES — add one [devices.<name>] block per device
# ============================================================

[devices.laptop]
name        = "laptop"
type        = "windows"           # windows | linux | android | mac
ip          = "127.0.0.1"         # LAN IP or Tailscale IP (100.x.x.x)
port        = 7070
auth_token  = "CHANGE_ME_strong_secret_token_here"
transport   = "lan"               # lan | tailscale | adb

# Uncomment and fill to add your phone:
#[devices.phone]
#name        = "phone"
#type        = "android"
#ip          = ""                 # Leave empty to use ADB instead of HTTP agent
#port        = 7070
#auth_token  = "CHANGE_ME_phone_secret_token"
#transport   = "adb"              # adb = direct ADB, no agent needed

# Uncomment to add a remote server:
#[devices.server]
#name        = "server"
#type        = "linux"
#ip          = "100.87.12.9"      # Tailscale IP
#port        = 7070
#auth_token  = "CHANGE_ME_server_token"
#transport   = "tailscale"

# ============================================================
# LLM — Natural language mode
# ============================================================

[llm]
enabled              = true

# Active backend: "gemini" (cloud, free tier) | "ollama" (local, offline)
# Switch to "ollama" once you have Ollama installed and a model pulled.
backend              = "gemini"

# ---- Gemini settings ----------------------------------------
# Get your free API key at: https://aistudio.google.com/apikey
# Option 1 (recommended): set env var  GEMINI_API_KEY=your_key_here
# Option 2: paste the key directly below (never commit to public git)
gemini_api_key       = ""             # or set GEMINI_API_KEY env var
gemini_model         = "gemini-2.5-flash"   # fast + free tier

# ---- Ollama settings (for when you switch to local) ---------
host                 = "http://localhost:11434"
model                = "mistral"       # or "llama3", "phi3", etc.
timeout              = 30

# ============================================================
# SCHEDULER — run skills on a schedule (optional)
# ============================================================

[schedule]
# morning = "07:00 daily"
# backup  = "23:00 daily"
# focus   = "09:00 weekdays"

# ============================================================
# CHANNELS — messaging integrations
# ============================================================

[channels.telegram]
# Get token from @BotFather on Telegram
# Or set TELEGRAM_BOT_TOKEN env var (preferred)
token          = ""                # leave blank — use TELEGRAM_BOT_TOKEN env var
dm_policy      = "pairing"         # "pairing" | "allowlist" | "open" | "disabled"
require_mention = false            # In groups: require @botmention (true recommended)
owner_id       = ""                # Your Telegram user ID (get from @userinfobot)
allowlist      = []                # ["123456789", "987654321"] — always-allowed user IDs
# Run: python main.py --telegram

[channels.discord]
# Get token from https://discord.com/developers/applications
# Enable "Message Content Intent" in bot settings
token          = ""                # or set DISCORD_BOT_TOKEN env var
dm_policy      = "pairing"
require_mention = true             # In servers: only respond when @mentioned
allowlist      = []                # Discord user IDs that are always allowed
guild_allowlist = []               # If set, only respond in these server IDs
# Run: python main.py --discord

[channels.voice]
# Requires: pip install faster-whisper pyttsx3 sounddevice numpy
wake_word      = "jarvis"          # Say this word to activate
language       = "en"              # Whisper language code
whisper_model  = "base"            # "tiny" | "base" | "small" | "medium"
tts_rate       = 175               # Words per minute for text-to-speech
voice_index    = 0                 # TTS voice index (0 = default system voice)
# Run: python main.py --voice

# ============================================================
# WEB GATEWAY — browser-based chat UI (Phase 4)
# ============================================================

[gateway]
host           = "127.0.0.1"       # NEVER change to 0.0.0.0 — use Tailscale for remote
port           = 7071
token          = ""                 # Optional: require ?token=xxx to access UI
                                    # Or set JARVIS_WEB_TOKEN env var
# Access:
#   Chat UI:   http://127.0.0.1:7071/
#   Dashboard: http://127.0.0.1:7071/dashboard
#   WebSocket: ws://127.0.0.1:7071/ws/{sender_id}
# Run: python main.py --web

# ============================================================
# AGENT SECURITY
# ============================================================

[agent]
listen_host    = "127.0.0.1"
listen_port    = 7070
auth_token     = "CHANGE_ME_strong_secret_token_here"

[agent.rate_limit]
per_minute     = 10
per_day        = 100
