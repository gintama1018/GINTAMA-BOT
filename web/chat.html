οΜΩ<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS Chat</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --accent2: #3fb950;
      --warn: #d29922;
      --text: #e6edf3;
      --muted: #8b949e;
      --tool-bg: #1c2128;
      --user-bg: #1f4068;
      --bot-bg: #161b22;
      --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Header ΟΔβÄùβ²§ΟΔβÄùβ²§ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a371f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .logo-sub { font-size: 11px; color: var(--muted); letter-spacing: 2px; }
    .status-pill {
      font-size: 12px; padding: 3px 10px; border-radius: 100px;
      background: #132d22; color: var(--accent2); border: 1px solid var(--accent2);
      display: flex; align-items: center; gap: 5px;
    }
    .status-pill .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent2); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Chat area ΟΔβÄùβ²§ΟΔβÄùβ²§ */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 12px;
      line-height: 1.55;
      word-break: break-word;
      font-size: 14.5px;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border-bottom-right-radius: 3px;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }
    .msg.tool {
      align-self: flex-start;
      background: var(--tool-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--warn);
      font-family: var(--font-mono);
      font-size: 12.5px;
      color: var(--warn);
      border-radius: 6px;
      max-width: 90%;
      padding: 6px 12px;
    }
    .msg.tool.result { border-left-color: var(--accent2); color: var(--accent2); }
    .msg.thinking {
      align-self: flex-start;
      color: var(--muted);
      font-style: italic;
      font-size: 13px;
      background: none;
      padding: 4px 0;
    }
    .msg pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      margin: 6px 0;
    }
    .msg code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: #0d1117;
      padding: 1px 5px;
      border-radius: 3px;
    }
    .msg strong { color: #f0f6fc; }
    .ts { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }

    /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Input area ΟΔβÄùβ²§ΟΔβÄùβ²§ */
    #input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14.5px;
      padding: 9px 12px;
      resize: none;
      min-height: 40px;
      max-height: 160px;
      font-family: inherit;
      line-height: 1.4;
      outline: none;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 16px;
      font-weight: 700;
      padding: 9px 16px;
      cursor: pointer;
      flex-shrink: 0;
      height: 40px;
      transition: opacity .2s;
    }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
    #send-btn:hover:not(:disabled) { opacity: .85; }
    #hint { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* ΟΔβÄùβ²§ΟΔβÄùβ²§ Scrollbar ΟΔβÄùβ²§ΟΔβÄùβ²§ */
    #chat::-webkit-scrollbar { width: 5px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">J</div>
    <div>
      <div class="logo-text">JARVIS</div>
      <div class="logo-sub">AI ASSISTANT</div>
    </div>
  </div>
  <div id="status" class="status-pill">
    <div class="dot"></div>
    <span id="status-text">Connecting...</span>
  </div>
</header>

<div id="chat">
  <div class="msg bot">
    ΟΑ≈ΗβÄ‰βÄΙ Hey! I'm <strong>JARVIS</strong>. I can control your devices, take screenshots,
    search the web, manage files, and much more.<br><br>
    Just tell me what to do ΟΔβ²§βÄù in plain English.
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="msg-input" rows="1" placeholder="Type a messageΟΔβ²§¬Π (Enter to send)" autocomplete="off"></textarea>
    <button id="send-btn" disabled>ΟΔ≈Ψ¬Λ</button>
  </div>
  <div id="hint">Enter to send Ο²¬Ζ Shift+Enter for new line Ο²¬Ζ /help for commands</div>
</div>

<script>
  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Config ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ //
  const WS_URL = `ws://${location.host}/ws/${crypto.randomUUID()}`;
  const TOKEN  = new URLSearchParams(location.search).get("token") || "";
  const wsUrl  = TOKEN ? `${WS_URL}?token=${TOKEN}` : WS_URL;

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ State ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ //
  let ws = null;
  let reconnectTimer = null;
  let busy = false;

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ DOM refs ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ //
  const chatEl   = document.getElementById("chat");
  const input    = document.getElementById("msg-input");
  const sendBtn  = document.getElementById("send-btn");
  const statusEl = document.getElementById("status-text");
  const statusBox= document.getElementById("status");

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ WebSocket ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ //
  function connect() {
    ws = new WebSocket(wsUrl);

    ws.onopen = () => {
      setStatus("Online", "#3fb950");
      sendBtn.disabled = false;
      clearTimeout(reconnectTimer);
    };

    ws.onclose = () => {
      setStatus("Disconnected", "#f0883e");
      sendBtn.disabled = true;
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      setStatus("Connection error", "#f85149");
    };

    ws.onmessage = (ev) => {
      try {
        const data = JSON.parse(ev.data);
        handleMessage(data);
      } catch (e) {
        appendMsg("bot", ev.data);
      }
    };
  }

  function setStatus(text, color) {
    statusEl.textContent = text;
    statusBox.style.background = color + "22";
    statusBox.style.borderColor = color;
    statusBox.style.color = color;
    statusBox.querySelector(".dot").style.background = color;
  }

  function handleMessage(data) {
    switch (data.type) {
      case "connected":
        // No need to show connection message
        break;
      case "thinking":
        showThinking();
        break;
      case "tool_call":
        removeThinking();
        appendMsg("tool", `ΟΔ≈Γβ³Δ ${data.tool}(${data.args})`);
        break;
      case "tool_result":
        appendMsg("tool result", `ΟΔ≈™βÄ€ ${data.tool}: ${data.result}`);
        break;
      case "response":
        removeThinking();
        appendMsg("bot", data.message);
        busy = false;
        sendBtn.disabled = false;
        break;
      case "error":
        removeThinking();
        appendMsg("bot", `ΟΔ≈Γ¬†Ο·¬Η¬è ${data.message}`);
        busy = false;
        sendBtn.disabled = false;
        break;
    }
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Message rendering ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ //
  function appendMsg(type, text) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerHTML = renderMarkdown(text);
    const ts = document.createElement("div");
    ts.className = "ts";
    ts.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    div.appendChild(ts);
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function showThinking() {
    const div = document.createElement("div");
    div.className = "msg thinking";
    div.id = "thinking-indicator";
    div.textContent = "JARVIS is thinkingΟΔβ²§¬Π";
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeThinking() {
    const el = document.getElementById("thinking-indicator");
    if (el) el.remove();
  }

  // Minimal markdown renderer (bold, italic, code blocks, inline code)
  function renderMarkdown(text) {
    text = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    // Code blocks
    text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, c) => `<pre>${c}</pre>`);
    // Inline code
    text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    // Italic
    text = text.replace(/\*(.+?)\*/g, "<em>$1</em>");
    // Newlines
    text = text.replace(/\n/g, "<br>");
    return text;
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Send ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ //
  function sendMessage() {
    const text = input.value.trim();
    if (!text || busy || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMsg("user", text);
    input.value = "";
    input.style.height = "auto";

    busy = true;
    sendBtn.disabled = true;

    ws.send(JSON.stringify({ message: text }));
  }

  // ΟΔβÄùβ²§ΟΔβÄùβ²§ Input events ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ΟΔβÄùβ²§ //
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 160) + "px";
  });
